<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Redirecting...</title>
    <script>
      // Redirect to hash-based route for GitHub Pages SPA support
      var path = window.location.pathname;
      window.location.replace(window.location.origin + '/#' + path);
    </script>
  </head>
  <body></body>
</html>
