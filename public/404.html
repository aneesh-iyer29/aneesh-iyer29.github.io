<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Redirecting...</title>
    <script>
      // GitHub Pages SPA fallback: remember the requested path, load the app
      // shell at "/", and let index.html restore the URL before React mounts.
      sessionStorage.redirect = location.pathname + location.search + location.hash;
      location.replace(location.origin);
    </script>
  </head>
  <body></body>
</html>
